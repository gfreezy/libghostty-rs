name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS aarch64
            runner: namespace-profile-libghostty-mac
          - name: Linux aarch64
            runner: namespace-profile-linux-aarch64-sm
          - name: Linux x86_64
            runner: namespace-profile-linux-x86-sm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Namespace cache
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1.4.3
        if: runner.os == 'Linux'
        with:
          path: |
            /nix

      - name: Setup Namespace cache
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1.4.3
        if: runner.os == 'macOS'
        with:
          path: |
            /Users/runner/zig

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Build package derivation
        run: nix build .#default --print-build-logs

      - name: Run flake checks
        run: nix flake check --print-build-logs

      - name: Check pkg-config path
        run: |
          nix develop --command cargo build -p libghostty-vt-sys
          PKG_CONFIG_PATH=$(find target/debug/build -path '*/out/ghostty-install/share/pkgconfig' | head -1)
          test -n "$PKG_CONFIG_PATH"
          export PKG_CONFIG_PATH
          nix develop --command cargo check -p libghostty-vt-sys --features pkg-config
