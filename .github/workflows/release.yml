name: Release prebuilt artifacts

# Builds the libghostty-vt static library for every supported target plus the
# target-independent bindings.rs, then publishes them (with a SHA256SUMS
# manifest) to a GitHub release that libghostty-vt-sys-vendored downloads from.
#
# The vendored crate derives the tag from its version (vt-prebuilt-v<version>)
# and verifies downloads against the release's own SHA256SUMS, so nothing is
# committed back to the repo. Releasing is one step: `./release.sh <version>`
# (bumps the version, commits, pushes, and pushes the matching tag), or push a
# `vt-prebuilt-v*` tag manually.

on:
  push:
    tags:
      - "vt-prebuilt-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to (e.g. vt-prebuilt-v0.1.1)"
        required: true

env:
  ZIG_VERSION: "0.15.2"

jobs:
  build-lib:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            ext: a
          # Cross-compiled from the arm runner (Zig cross-builds the archive)
          # to avoid depending on scarce Intel macOS runners.
          - target: x86_64-apple-darwin
            runner: macos-14
            ext: a
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: a
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            ext: a
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            ext: a
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            ext: a
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            ext: lib
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            ext: lib
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build static library
        run: cargo build --release -p libghostty-vt-sys --target ${{ matrix.target }}

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          lib=$(find "target/${{ matrix.target }}/release/build" \
            -path '*ghostty-install/lib/*' -name 'libghostty-vt.a' | head -1)
          test -n "$lib" || { echo "static lib not found"; exit 1; }
          mkdir -p dist
          cp "$lib" "dist/libghostty-vt-${{ matrix.target }}-static.${{ matrix.ext }}"

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          lib=$(find "target/${{ matrix.target }}/release/build" \
            -path '*ghostty-install/lib/*' \
            \( -name 'ghostty-vt-static.lib' -o -name 'ghostty-vt.lib' \) | head -1)
          test -n "$lib" || { echo "static lib not found"; exit 1; }
          mkdir -p dist
          cp "$lib" "dist/libghostty-vt-${{ matrix.target }}-static.${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  build-bindings:
    name: bindings.rs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install libclang (for bindgen)
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev

      - name: Build sys crate (produces headers)
        run: cargo build -p libghostty-vt-sys

      - name: Generate bindings
        run: cargo run -p libghostty-vt-sys --features bindgen-tool --bin gen-bindings

      - name: Stage bindings
        run: |
          mkdir -p dist
          cp crates/libghostty-vt-sys/src/bindings.rs dist/bindings.rs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings
          path: dist/bindings.rs
          if-no-files-found: error

  publish:
    name: Publish release
    needs: [build-lib, build-bindings]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: staging

      - name: Assemble release dir + SHA256SUMS
        run: |
          set -euo pipefail
          mkdir -p release
          find staging -type f \( -name 'libghostty-vt-*' -o -name 'bindings.rs' \) \
            -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS
          echo "=== Release assets ==="
          ls -la
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release/* --clobber
          else
            gh release create "$tag" release/* \
              --title "$tag" \
              --notes "Prebuilt libghostty-vt artifacts. Consumed by libghostty-vt-sys-vendored."
          fi
          # SHA256SUMS is published as a release asset; the vendored crate's
          # build.rs downloads it to verify the artifacts. Nothing is committed
          # back to the repository.
