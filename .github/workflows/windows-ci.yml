name: Windows CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86_64 MSVC
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - name: Windows aarch64 MSVC
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      # Build the native static library from source (Zig), then point the
      # vendored crate at it so libghostty-vt links the locally built archive
      # instead of downloading a prebuilt one.
      - name: Build libghostty-vt-sys (native lib)
        run: cargo build -p libghostty-vt-sys --target ${{ matrix.target }}

      - name: Build libghostty-vt via prebuilt dir
        shell: bash
        run: |
          set -euo pipefail
          libdir=$(dirname "$(find "target/${{ matrix.target }}/debug/build" \
            -path '*ghostty-install/lib/*' \
            \( -name 'ghostty-vt-static.lib' -o -name 'ghostty-vt.lib' \) | head -1)")
          test -n "$libdir" || { echo "static lib not found"; exit 1; }
          export GHOSTTY_VT_PREBUILT_DIR="$libdir"
          cargo build -p libghostty-vt --target ${{ matrix.target }}
